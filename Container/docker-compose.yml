version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16
    container_name: fin_postgres
    restart: always
    environment:
      POSTGRES_DB: fin_app
      POSTGRES_USER: fin_app
      POSTGRES_PASSWORD: fin_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fin_app -d fin_app"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: fin_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Aplicação .NET 9
  fin-api:
    build:
      context: ..
      dockerfile: Container/Dockerfile
    container_name: fin_api
    restart: always
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=fin_app;Username=fin_app;Password=fin_app
      - ApiSettings__Redis=redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
